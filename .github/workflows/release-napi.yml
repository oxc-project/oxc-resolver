name: Release NAPI

permissions: {}

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - package.json

env:
  DEBUG: napi:*

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Check version
    runs-on: ubuntu-latest
    outputs:
      version_changed: ${{ steps.version.outputs.changed }}
    steps:
      - uses: taiki-e/checkout-action@3ab630d442e198ebb0ca30872832406ca01c46eb # v1.4.0

      - name: Check version changes
        uses: EndBug/version-check@5102328418c0130d66ca712d755c303e93368ce2 # v2.1.7
        id: version
        with:
          static-checking: localIsNew
          file-url: https://unpkg.com/oxc-resolver@latest/package.json
          file-name: package.json

      - name: Set version name
        if: steps.version.outputs.changed == 'true'
        env:
          version: ${{ steps.version.outputs.version }}
        run: echo "version=${version}"

  build:
    needs: check
    if: needs.check.outputs.version_changed == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            build: vp build
          - os: windows-latest
            target: aarch64-pc-windows-msvc
            build: vp build
          - os: windows-latest
            target: i686-pc-windows-msvc
            architecture: x86
            cpu: ia32
            build: vp build
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            build: vp build --use-napi-cross
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            build: vp build -x
          - os: ubuntu-latest
            target: aarch64-linux-android
            build: vp build
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            build: vp build --use-napi-cross
          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            build: vp build -x
          - os: ubuntu-latest
            target: armv7-unknown-linux-gnueabihf
            build: vp build --use-napi-cross
          - os: ubuntu-latest
            target: armv7-linux-androideabi
            architecture: x64
            build: vp build
          - os: ubuntu-latest
            target: armv7-unknown-linux-musleabihf
            build: vp build -x
          - os: ubuntu-latest
            target: powerpc64le-unknown-linux-gnu
            build: vp build --use-napi-cross
          - os: ubuntu-latest
            target: riscv64gc-unknown-linux-gnu
            build: |-
              sudo apt-get update &&
              sudo apt-get install gcc-riscv64-linux-gnu g++-riscv64-linux-gnu -y &&
              export TARGET_CC=riscv64-linux-gnu-gcc &&
              export CXX=riscv64-linux-gnu-g++ &&
              vp build
          - os: ubuntu-latest
            target: riscv64gc-unknown-linux-musl
            build: vp build -x
          - os: ubuntu-latest
            target: s390x-unknown-linux-gnu
            build: export CFLAGS="-fuse-ld=lld" && vp build --use-napi-cross
          - os: macos-latest
            target: x86_64-apple-darwin
            build: vp build
          - os: macos-latest
            target: aarch64-apple-darwin
            build: vp build
          - os: ubuntu-latest
            target: wasm32-wasip1-threads
            build: vp run build:debug --release && vp run postbuild:debug # omit --features allocator
          - os: ubuntu-latest
            target: aarch64-unknown-linux-ohos
            build: vp build --target aarch64-unknown-linux-ohos

    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    steps:
      - uses: taiki-e/checkout-action@3ab630d442e198ebb0ca30872832406ca01c46eb # v1.4.0

      - uses: ./.github/actions/vp
        with:
          architecture: ${{ matrix.architecture }}
          cpu: ${{ matrix.cpu }}

      - run: rustup target add ${{ matrix.target }}

      - name: Setup OpenHarmony SDK
        if: ${{ contains(matrix.target, 'ohos') }}
        uses: Boshen/setup-ohos-sdk@edb865a89a712f1f15dbad932dfa9cfce849d95c # v1.0.0

      - uses: goto-bus-stop/setup-zig@abea47f85e598557f500fa1fd2ab7464fcb39406 # v2.2.1
        if: ${{ contains(matrix.target, 'musl') }}
        with:
          version: 0.13.0

      - name: Build
        run: ${{ matrix.build }} --target ${{ matrix.target }}
        shell: bash
        env:
          TARGET_CC: clang # for mimalloc

      - name: Upload artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          if-no-files-found: error
          name: bindings-${{ matrix.target }}
          path: |
            napi/*.node
            napi/*.wasm

  build-freebsd:
    needs: check
    if: needs.check.outputs.version_changed == 'true'
    name: Build FreeBSD
    runs-on: ubuntu-latest
    steps:
      - uses: taiki-e/checkout-action@3ab630d442e198ebb0ca30872832406ca01c46eb # v1.4.0
      - name: Build
        id: build
        uses: cross-platform-actions/action@492b0c80085400348c599edace11141a4ee73524 # v0.32.0
        env:
          DEBUG: napi:*
          RUSTUP_IO_THREADS: 1
        with:
          operating_system: freebsd
          version: 14.2
          memory: 8G
          cpu_count: 3
          environment_variables: DEBUG RUSTUP_IO_THREADS
          shell: bash
          run: |
            sudo pkg install -y -f curl libnghttp2 node22 npm cmake
            curl https://sh.rustup.rs -sSf --output rustup.sh
            sh rustup.sh -y --profile minimal --default-toolchain stable
            source "$HOME/.cargo/env"
            echo "~~~~ rustc --version ~~~~"
            rustc --version
            echo "~~~~ node -v ~~~~"
            node -v
            pwd
            ls -lah
            whoami
            env
            curl -fsSL https://staging.viteplus.dev/install.sh | bash
            export PATH="$HOME/.vite-plus/bin:$PATH"
            vp install
            vp build --target x86_64-unknown-freebsd
            rm -rf node_modules
            rm -rf target
      - name: Upload artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: bindings-freebsd
          path: napi/*.node
          if-no-files-found: error

  publish:
    name: Publish NAPI
    runs-on: ubuntu-latest
    permissions:
      id-token: write # for `npm publish --provenance`
    needs:
      - build
      - build-freebsd
    steps:
      - uses: taiki-e/checkout-action@3ab630d442e198ebb0ca30872832406ca01c46eb # v1.4.0

      - name: Setup Node.js
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version-file: .node-version
          package-manager-cache: false

      - uses: voidzero-dev/setup-vp@bd1d5cdfff6feadf7edfdf85d0a66e8b3415ee4a # v1
        with:
          cache: true
          run-install: false

      - name: Install dependencies
        run: vp install --frozen-lockfile

      - name: Download Artifacts
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          path: artifacts

      - run: npm install -g npm@latest # For trusted publishing support

      - name: Prepare dirs and artifacts
        run: |
          cp package.json napi/package.json
          vp napi create-npm-dirs
          vp napi artifacts --npm-dir npm --build-output-dir napi

      - name: Publish npm packages as latest
        run: |
          # Using trusted publishing, no token is required.
          vp napi pre-publish --no-gh-release --tagstyle npm --npm-dir npm

          # Publish root package
          cp package.json napi/package.json
          cp README.md napi/README.md
          npm publish napi/ --tag latest --provenance --access public
