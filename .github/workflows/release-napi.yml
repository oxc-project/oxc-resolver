name: Release NAPI

permissions: {}

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - package.json

env:
  DEBUG: napi:*

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Check version
    runs-on: ubuntu-latest
    outputs:
      version_changed: ${{ steps.version.outputs.changed }}
    steps:
      - uses: taiki-e/checkout-action@7d1e50e93dc4fb3bba58f85018fadf77898aee8b # v1.4.2

      - name: Check version changes
        uses: EndBug/version-check@095362f3cd50f690c8fa0e6afeea81834bd8d320 # v3.0.0
        id: version
        with:
          static-checking: localIsNew
          file-url: https://unpkg.com/oxc-resolver@latest/package.json
          file-name: package.json

      - name: Set version name
        if: steps.version.outputs.changed == 'true'
        env:
          version: ${{ steps.version.outputs.version }}
        run: echo "version=${version}"

  build:
    needs: check
    if: needs.check.outputs.version_changed == 'true'
    env:
      # Rebuild std without its backtrace symbolizer for smaller shipped binaries.
      # The gate (RUSTC_BOOTSTRAP + -Z build-std for the release profile's panic=abort)
      # lives in napi/build.mjs and only fires on release builds with an explicit --target.
      OXC_RESOLVER_BUILD_STD: "1"
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            build: pnpm build
          - os: windows-latest
            target: aarch64-pc-windows-msvc
            build: pnpm build
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            build: pnpm build --use-napi-cross
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            build: pnpm build -x
          - os: ubuntu-latest
            target: aarch64-linux-android
            build: pnpm build
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            build: pnpm build --use-napi-cross
          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            build: pnpm build -x
          - os: ubuntu-latest
            target: armv7-unknown-linux-gnueabihf
            build: pnpm build --use-napi-cross
          - os: ubuntu-latest
            target: armv7-linux-androideabi
            architecture: x64
            build: pnpm build
          - os: ubuntu-latest
            target: armv7-unknown-linux-musleabihf
            build: pnpm build -x
          - os: ubuntu-latest
            target: powerpc64le-unknown-linux-gnu
            build: pnpm build --use-napi-cross
          - os: ubuntu-latest
            target: riscv64gc-unknown-linux-gnu
            build: |-
              sudo apt-get update &&
              sudo apt-get install gcc-riscv64-linux-gnu g++-riscv64-linux-gnu -y &&
              export TARGET_CC=riscv64-linux-gnu-gcc &&
              export CXX=riscv64-linux-gnu-g++ &&
              pnpm build
          - os: ubuntu-latest
            target: riscv64gc-unknown-linux-musl
            build: pnpm build -x
          - os: ubuntu-latest
            target: s390x-unknown-linux-gnu
            build: export CFLAGS="-fuse-ld=lld" && pnpm build --use-napi-cross
          - os: macos-latest
            target: x86_64-apple-darwin
            build: pnpm build
          - os: macos-latest
            target: aarch64-apple-darwin
            build: pnpm build
          - os: ubuntu-latest
            target: wasm32-wasip1-threads
            build: pnpm run build:debug --release # omit --features allocator
          - os: ubuntu-latest
            target: aarch64-unknown-linux-ohos
            build: pnpm build --target aarch64-unknown-linux-ohos

    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    steps:
      - uses: taiki-e/checkout-action@7d1e50e93dc4fb3bba58f85018fadf77898aee8b # v1.4.2

      - uses: ./.github/actions/pnpm
        with:
          architecture: ${{ matrix.architecture }}
          cpu: ${{ matrix.cpu }}

      - run: rustup target add ${{ matrix.target }}

      # std sources for `-Z build-std` (OXC_RESOLVER_BUILD_STD, see napi/build.mjs)
      - run: rustup component add rust-src

      - name: Setup OpenHarmony SDK
        if: ${{ contains(matrix.target, 'ohos') }}
        uses: Boshen/setup-ohos-sdk@edb865a89a712f1f15dbad932dfa9cfce849d95c # v1.0.0

      - uses: goto-bus-stop/setup-zig@abea47f85e598557f500fa1fd2ab7464fcb39406 # v2.2.1
        if: ${{ contains(matrix.target, 'musl') }}
        with:
          version: 0.13.0

      - name: Build
        run: ${{ matrix.build }} --target ${{ matrix.target }}
        shell: bash
        env:
          TARGET_CC: clang # for mimalloc

      - name: Upload artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          if-no-files-found: error
          name: bindings-${{ matrix.target }}
          path: |
            napi/*.node
            napi/*.wasm

  build-freebsd:
    needs: check
    if: needs.check.outputs.version_changed == 'true'
    name: Build FreeBSD
    # Deliberately does not set OXC_RESOLVER_BUILD_STD: provisioning rust-src inside the VM
    # isn't worth it for this niche target, so its binary keeps the prebuilt std.
    runs-on: ubuntu-latest
    steps:
      - uses: taiki-e/checkout-action@7d1e50e93dc4fb3bba58f85018fadf77898aee8b # v1.4.2
      - name: Build
        id: build
        uses: cross-platform-actions/action@5ea7e8e4677bd726033a10b094ba1c5762b15dee # v1.3.0
        env:
          DEBUG: napi:*
          RUSTUP_IO_THREADS: 1
        with:
          operating_system: freebsd
          version: 14.2
          memory: 8G
          cpu_count: 3
          environment_variables: DEBUG RUSTUP_IO_THREADS
          shell: bash
          run: |
            sudo pkg install -y -f curl libnghttp2 node22 npm cmake
            curl https://sh.rustup.rs -sSf --output rustup.sh
            sh rustup.sh -y --profile minimal --default-toolchain stable
            source "$HOME/.cargo/env"
            echo "~~~~ rustc --version ~~~~"
            rustc --version
            echo "~~~~ node -v ~~~~"
            node -v
            pwd
            ls -lah
            whoami
            env
            export COREPACK_INTEGRITY_KEYS=0
            sudo corepack enable
            pnpm install
            # Call the build script directly: vite-plus has no freebsd-x64 native binding,
            # so the `vp run`-based `pnpm build` script can't be loaded here.
            node napi/build.mjs --features allocator --release --target x86_64-unknown-freebsd
            node napi/patch.mjs
            rm -rf node_modules
            rm -rf target
      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: bindings-freebsd
          path: napi/*.node
          if-no-files-found: error

  publish:
    name: Publish NAPI
    runs-on: ubuntu-latest
    permissions:
      id-token: write # for `npm publish --provenance`
    needs:
      - build
      - build-freebsd
    steps:
      - uses: taiki-e/checkout-action@7d1e50e93dc4fb3bba58f85018fadf77898aee8b # v1.4.2

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download Artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts

      - run: npm install -g npm@latest # For trusted publishing support

      - name: Prepare dirs and artifacts
        # Invoke napi directly. Going through `pnpm napi ...` triggers pnpm 11's
        # verify-deps-before-run check, which fails after `cp package.json
        # napi/package.json` introduces deps the lockfile doesn't know about.
        run: |
          cp package.json napi/package.json
          ./node_modules/.bin/napi create-npm-dirs
          ./node_modules/.bin/napi artifacts --npm-dir npm --build-output-dir napi

      - name: Publish npm packages as latest
        run: |
          # Using trusted publishing, no token is required.
          ./node_modules/.bin/napi pre-publish --no-gh-release --tagstyle npm --npm-dir npm

          # Publish root package
          cp package.json napi/package.json
          cp README.md napi/README.md
          npm publish napi/ --tag latest --provenance --access public
